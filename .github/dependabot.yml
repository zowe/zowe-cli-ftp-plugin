version: 2
updates:
  # Enable updates for GitHub actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    target-branch: "master"
  # Enable updates for GitHub actions
  - package-ecosystem: "github-actions"
